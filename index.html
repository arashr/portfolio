<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <meta name="description" content="Case studies as an editorial poster gallery — built from Markdown.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link id="fonts-link" rel="stylesheet" href="">
  <link rel="stylesheet" href="assets/site.css">
  <link rel="stylesheet" href="assets/reader.css">
  <link rel="stylesheet" href="assets/portfolio.css">
  <script>
    (function () {
      if (localStorage.getItem('md-portfolio-theme') !== 'light') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body id="app">
  <a class="skip-link" href="#main">Skip to content</a>

  <section class="page-landing" id="landing" aria-label="Case studies">
    <main class="landing-main landing-main--portfolio" id="main">
      <div class="reader-layout">
        <div class="content-feed landing-feed">
          <div id="landing-gallery-grid" class="poster-gallery posts-list landing-gallery landing-gallery--home landing-mosaic-host" role="list"></div>
        </div>
        <aside class="landing-aside" id="landing-aside" aria-label="About" hidden></aside>
      </div>
    </main>
    <footer class="landing-foot mono-label">
      <p class="landing-foot__lead">Built on my own project <a class="chrome-link" href="https://github.com/arashr/md-gallery" target="_blank" rel="noopener noreferrer">MD Gallery</a></p>
    </footer>
  </section>

  <section class="page-reader" id="reader" hidden aria-label="Case study reader">
    <header class="site-header site-header--reader">
      <div class="header-inner reader-header">
        <div class="reader-header__primary">
          <button type="button" class="brand brand--reader brand-home" id="reader-home" aria-label="All case studies">
            <span class="site-header__brand" id="reader-site-brand">Portfolio</span>
          </button>
          <div class="reader-header__tools">
            <div class="nav-toc-wrap">
              <button type="button" class="btn-ghost btn-with-icon" id="toc-toggle" aria-expanded="false" aria-controls="toc-panel">
                <span class="btn-icon-slot" data-icon="list" aria-hidden="true"></span>
                <span class="btn-label">Contents</span>
              </button>
              <div class="toc-panel" id="toc-panel" role="navigation" aria-label="Table of contents">
                <p class="toc-panel__label">Contents</p>
                <div id="toc-root"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="reader-header__meta mono-label">
          <p class="reader-header__role" id="reader-site-tagline">Case studies</p>
          <p class="reader-header__meta-aside" id="reader-header-link">
            <a class="chrome-link" href="https://www.linkedin.com/in/arashranjbaran/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          </p>
        </div>
      </div>
    </header>
    <div class="reader-layout">
      <main id="main-reader" class="content-feed collection-feed"></main>
      <aside class="reader-toc-rail" id="reader-toc-rail" aria-hidden="true" aria-label="Table of contents">
        <div class="reader-toc-rail__inner">
          <p class="toc-panel__label">Contents</p>
          <div id="toc-rail-root"></div>
        </div>
      </aside>
    </div>
    <button type="button" id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>
  </section>

  <script type="importmap">
  {
    "imports": {
      "marked": "./node_modules/marked/lib/marked.esm.js",
      "dompurify": "./node_modules/dompurify/dist/purify.es.mjs",
      "isomorphic-dompurify": "./node_modules/isomorphic-dompurify/dist/browser.mjs",
      "html2canvas": "./node_modules/html2canvas/dist/html2canvas.esm.js"
    }
  }
  </script>
  <script type="module" src="assets/portfolio.js"></script>
</body>
</html>
